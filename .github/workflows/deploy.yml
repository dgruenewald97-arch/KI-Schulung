name: Deploy to GitHub Pages

# Baut die Vite-App frisch aus dem Quellcode (src/) und veröffentlicht
# das Build-Ergebnis (dist/) auf GitHub Pages. Dadurch spiegelt die
# Live-Seite immer den aktuellen Stand im Repo wider – keine manuell
# committeten Build-Artefakte mehr nötig.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Rechte, die der Pages-Deploy braucht
permissions:
  contents: read
  pages: write
  id-token: write

# Immer nur ein Deploy gleichzeitig
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
